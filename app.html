<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TSO Betaalverzoeken — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app-body">
  <div class="layout">
    <aside class="sidebar">
      <a href="#/overzicht" class="brand" id="brand">
        <span class="brand-logo">TSO</span>
        <span class="brand-name">Dashboard</span>
      </a>

      <nav class="nav" id="nav">
        <a href="#/overzicht" data-route="overzicht" class="nav-item">Overzicht</a>
        <div class="nav-groepen" id="nav-groepen"></div>
      </nav>

      <div class="sidebar-bottom">
        <a href="#/instellingen" data-route="instellingen" class="nav-item">
          <span>Instellingen</span>
        </a>
        <button id="logout-btn" class="nav-item nav-button">Uitloggen</button>
      </div>
    </aside>

    <div class="hoofd">
      <header class="topbar">
        <div class="topbar-zoek">
          <svg class="zoek-icoon" width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="zoek-leerling" placeholder="Zoek leerling…" autocomplete="off" />
          <div class="zoek-resultaat" id="zoek-resultaat" hidden></div>
        </div>

        <div class="topbar-rechts">
        <div class="topbar-menu" id="overzichten-menu">
          <button type="button" class="topbar-knop" id="overzichten-btn">
            Overzichten <span class="chevron">▾</span>
          </button>
          <div class="topbar-dropdown" id="overzichten-dropdown" hidden>
            <button type="button" class="dropdown-item" data-rapport="deelnemers">Deelnemers TSO</button>
            <button type="button" class="dropdown-item" data-rapport="openstaand">Openstaande betalingen</button>
            <button type="button" class="dropdown-item" data-rapport="binnengekomen">Binnengekomen betalingen</button>
            <button type="button" class="dropdown-item" data-rapport="totaal">Totaaloverzicht</button>
            <button type="button" class="dropdown-item" data-rapport="backup">Back-up (Excel)</button>
          </div>
        </div>

        <label class="schooljaar-kiezer">
          <span>Schooljaar</span>
          <select id="schooljaar-select"></select>
        </label>

        <button type="button" id="betaling-btn" class="topbar-knop topbar-icon"
                title="Betaling toevoegen (overgemaakt)" aria-label="Betaling toevoegen">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="12" x="2" y="6" rx="2" />
            <circle cx="12" cy="12" r="2" />
            <path d="M6 12h.01M18 12h.01" />
          </svg>
        </button>

        <a href="#/import" data-route="import" class="topbar-knop topbar-icon"
           title="Importeren (EDEX of betaal-export)" aria-label="Importeren">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </a>
        </div>
      </header>

      <main class="content" id="content">
        <div class="loader">Laden…</div>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
